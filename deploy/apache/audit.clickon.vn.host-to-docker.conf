# Apache on the HOST: SSL/public reverse proxy to Nginx inside Docker Compose.
#
# Production compose publishes Docker Nginx on 127.0.0.1:18080 by default.
# All paths, including /backend/, are proxied unchanged. Docker Nginx then routes
# / to Next.js and /backend/ to Laravel.
#
# Enable:
#   sudo a2enmod proxy proxy_http headers rewrite ssl
#   sudo cp /var/www/<repo>/deploy/apache/audit.clickon.vn.host-to-docker.conf /etc/apache2/sites-available/audit.clickon.vn.conf
#   sudo a2ensite audit.clickon.vn.conf
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName audit.clickon.vn

    ProxyRequests Off
    ProxyPreserveHost On
    ProxyTimeout 300

    RequestHeader set X-Forwarded-Proto "https" env=HTTPS
    RequestHeader set X-Forwarded-Proto "http" env=!HTTPS
    RequestHeader set X-Forwarded-Host "audit.clickon.vn"

    ProxyPass "/" "http://127.0.0.1:18080/" retry=0 timeout=300
    ProxyPassReverse "/" "http://127.0.0.1:18080/"

    ErrorLog ${APACHE_LOG_DIR}/audit.clickon.vn-error.log
    CustomLog ${APACHE_LOG_DIR}/audit.clickon.vn-access.log combined
</VirtualHost>
