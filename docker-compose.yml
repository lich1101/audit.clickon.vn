name: clickon-audit-dev

x-app-dns: &app_dns
  - 8.8.8.8
  - 1.1.1.1

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: clickon_audit
      MYSQL_USER: clickon
      MYSQL_PASSWORD: clickon
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "127.0.0.1:${CLICKON_AUDIT_DEV_MYSQL_PORT:-13306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./app
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file:
      - ./app/.env
    volumes:
      - ./app:/var/www/html
    dns: *app_dns
    ports:
      - "127.0.0.1:${CLICKON_AUDIT_DEV_API_PORT:-18000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    command: php artisan serve --host=0.0.0.0 --port=8000

  queue:
    build:
      context: ./app
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    env_file:
      - ./app/.env
    volumes:
      - ./app:/var/www/html
    dns: *app_dns
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c 'workers="$${QUEUE_WORKERS:-3}"; for i in $$(seq 1 "$$workers"); do php artisan queue:work --tries=1 --timeout=0 & done; wait'

  composer:
    image: composer:2
    working_dir: /var/www/html
    env_file:
      - ./app/.env
    volumes:
      - ./app:/var/www/html
    dns: *app_dns

volumes:
  mysql_data:
