x-app-dns: &app_dns
  - 8.8.8.8
  - 1.1.1.1

x-app-host-gateway: &app_host_gateway
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-app-firecrawl-network: &app_firecrawl_network
  networks:
    - default
    - firecrawl_backend

services:
  api:
    build:
      context: ./app
      dockerfile: docker/php/Dockerfile.prod
      args:
        COMPOSER_MEMORY_LIMIT: ${COMPOSER_MEMORY_LIMIT:-512M}
    image: clickon-audit-api:latest
    restart: unless-stopped
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
    dns: *app_dns
    <<: [*app_host_gateway, *app_firecrawl_network]
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
      - ./app/storage/app/private/audit-ai-responses:/var/www/html/storage/app/private/audit-ai-responses
    deploy:
      resources:
        limits:
          memory: 384M

  queue:
    image: clickon-audit-api:latest
    restart: unless-stopped
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
    dns: *app_dns
    <<: [*app_host_gateway, *app_firecrawl_network]
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
      - ./app/storage/app/private/audit-ai-responses:/var/www/html/storage/app/private/audit-ai-responses
    depends_on:
      api:
        condition: service_started
    command: start-queue-supervisor
    deploy:
      resources:
        limits:
          memory: 2048M

  scheduler:
    image: clickon-audit-api:latest
    restart: unless-stopped
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
    dns: *app_dns
    <<: [*app_host_gateway, *app_firecrawl_network]
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
      - ./app/storage/app/private/audit-ai-responses:/var/www/html/storage/app/private/audit-ai-responses
    depends_on:
      api:
        condition: service_started
      queue:
        condition: service_started
    command: run-php artisan schedule:work --no-interaction
    deploy:
      resources:
        limits:
          memory: 256M

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_LARAVEL_API_URL: ${NEXT_PUBLIC_LARAVEL_API_URL:-https://audit.clickon.vn/backend}
        NODE_BUILD_HEAP_MB: ${NODE_BUILD_HEAP_MB:-768}
    restart: unless-stopped
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      LARAVEL_API_URL: ${LARAVEL_API_URL:-http://api:8000}
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 384M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Mặc định chỉ bind 127.0.0.1 + cổng 18080 để không đụng Nginx/App khác trên cùng máy.
    # Máy chỉ dành riêng: đặt NGINX_BIND=0.0.0.0 và NGINX_HTTP_PORT=80 trong docker.prod.env
    ports:
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_HTTP_PORT:-18080}:80"
    volumes:
      - ./deploy/docker/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M

  artisan:
    profiles: ["tools"]
    build:
      context: ./app
      dockerfile: docker/php/Dockerfile.prod
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
    dns: *app_dns
    <<: [*app_host_gateway, *app_firecrawl_network]
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
    entrypoint: ["php", "artisan"]

networks:
  firecrawl_backend:
    external: true
