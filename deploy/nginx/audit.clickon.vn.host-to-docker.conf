# Nginx trên máy chủ (HOST): reverse proxy + SSL termination tới Nginx trong Docker Compose production.
#
# Stack prod mặc định publish cổng: 127.0.0.1:18080 (đổi bằng NGINX_HTTP_PORT trong deploy/env/docker.prod.env).
# Mọi request (gồm /backend/) gửi thẳng lên upstream này; Nginx trong container sẽ tách / và /backend/.
#
# Cài:
#   sudo cp /var/www/<repo>/deploy/nginx/audit.clickon.vn.host-to-docker.conf /etc/nginx/sites-available/audit.clickon.vn.conf
#   sudo ln -sf /etc/nginx/sites-available/audit.clickon.vn.conf /etc/nginx/sites-enabled/audit.clickon.vn.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (Let's Encrypt):
#   sudo certbot --nginx -d audit.clickon.vn

server {
    listen 80;
    server_name audit.clickon.vn;

    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
