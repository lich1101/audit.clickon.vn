x-web-env: &web-env
  NODE_ENV: production
  HOSTNAME: 0.0.0.0
  PORT: 3000
  NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
  NEXT_PUBLIC_LARAVEL_API_URL: ${NEXT_PUBLIC_LARAVEL_API_URL}
  LARAVEL_API_URL: ${LARAVEL_API_URL}
  LARAVEL_INTERNAL_API_KEY: ${LARAVEL_INTERNAL_API_KEY}
  FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
  FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL}
  FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY}

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./app
      dockerfile: docker/php/Dockerfile.prod
    image: clickon-audit-api:prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment: *laravel-env
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
    ports:
      - "127.0.0.1:8000:8000"

  queue:
    image: clickon-audit-api:prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment: *laravel-env
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=300", "--sleep=3"]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_LARAVEL_API_URL: ${NEXT_PUBLIC_LARAVEL_API_URL}
    image: clickon-audit-web:prod
    restart: unless-stopped
    depends_on:
      - api
    environment: *web-env
    ports:
      - "127.0.0.1:3000:3000"

  artisan:
    image: clickon-audit-api:prod
    profiles: ["tools"]
    depends_on:
      mysql:
        condition: service_healthy
    environment: *laravel-env
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
    entrypoint: ["php", "artisan"]

volumes:
  mysql_data:
