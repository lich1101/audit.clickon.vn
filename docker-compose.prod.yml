services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-clickon_audit}
      MYSQL_USER: ${DB_USERNAME:-clickon}
      MYSQL_PASSWORD: ${DB_PASSWORD:-clickon}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build:
      context: ./app
      dockerfile: docker/php/Dockerfile.prod
      args:
        COMPOSER_MEMORY_LIMIT: ${COMPOSER_MEMORY_LIMIT:-512M}
    image: clickon-audit-api:latest
    restart: unless-stopped
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
      - ./app/storage/app/private/audit-ai-responses:/var/www/html/storage/app/private/audit-ai-responses
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 384M

  queue:
    image: clickon-audit-api:latest
    restart: unless-stopped
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
      - ./app/storage/app/private/audit-ai-responses:/var/www/html/storage/app/private/audit-ai-responses
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started
    command: sh -c 'workers="$${QUEUE_WORKERS:-3}"; for i in $$(seq 1 "$$workers"); do php artisan queue:work --tries=1 --timeout=0 & done; wait'
    deploy:
      resources:
        limits:
          memory: 768M

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_FIREBASE_API_KEY: ${NEXT_PUBLIC_FIREBASE_API_KEY}
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${NEXT_PUBLIC_FIREBASE_PROJECT_ID}
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
        NEXT_PUBLIC_FIREBASE_APP_ID: ${NEXT_PUBLIC_FIREBASE_APP_ID}
        NEXT_PUBLIC_LARAVEL_API_URL: ${NEXT_PUBLIC_LARAVEL_API_URL:-https://audit.clickon.vn/backend}
        NODE_BUILD_HEAP_MB: ${NODE_BUILD_HEAP_MB:-768}
    restart: unless-stopped
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      LARAVEL_API_URL: ${LARAVEL_API_URL:-http://api:8000}
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 384M

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Mặc định chỉ bind 127.0.0.1 + cổng 18080 để không đụng Nginx/App khác trên cùng máy.
    # Máy chỉ dành riêng: đặt NGINX_BIND=0.0.0.0 và NGINX_HTTP_PORT=80 trong docker.prod.env
    ports:
      - "${NGINX_BIND:-127.0.0.1}:${NGINX_HTTP_PORT:-18080}:80"
    volumes:
      - ./deploy/docker/nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M

  artisan:
    profiles: ["tools"]
    build:
      context: ./app
      dockerfile: docker/php/Dockerfile.prod
    env_file:
      - ./deploy/env/docker.prod.env
    environment:
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - ./app/storage/app/firebase-service-account.json:/var/www/html/storage/app/firebase-service-account.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    entrypoint: ["php", "artisan"]

volumes:
  mysql_data:
